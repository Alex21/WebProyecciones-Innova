<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INNOVA · Bienvenido</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#0D1F5C;--navy-l:#1A3080;--blu:#A8D4F5;--blum:#5AAEE0}
  body{
    font-family:'DM Mono',monospace;
    background:var(--navy);
    min-height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    overflow:hidden;position:relative;
  }

  /* FONDO */
  .bg-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .circle{position:absolute;border-radius:50%;opacity:.07;animation:flt 9s ease-in-out infinite}
  .c1{width:520px;height:520px;background:var(--blu);top:-160px;left:-160px}
  .c2{width:380px;height:380px;background:var(--blum);bottom:-120px;right:-120px;animation-delay:3s}
  .c3{width:260px;height:260px;background:var(--blu);top:50%;left:62%;animation-delay:6s}
  @keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-28px)}}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twk 3s ease-in-out infinite}
  @keyframes twk{0%,100%{opacity:.12}50%{opacity:.8}}

  /* CARD */
  .card{
    position:relative;z-index:10;
    background:rgba(255,255,255,.07);
    backdrop-filter:blur(20px);
    border:1px solid rgba(168,212,245,.2);
    border-radius:32px;
    padding:32px 48px 40px;
    max-width:480px;width:92%;
    text-align:center;
    box-shadow:0 28px 64px rgba(0,0,0,.5);
    animation:up .9s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes up{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}

  .badge{
    display:inline-flex;align-items:center;gap:8px;
    font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--blu);opacity:.7;margin-bottom:20px;
  }
  .dot{width:4px;height:4px;background:var(--blu);border-radius:50%}

  /* BURBUJA ARRIBA */
  .bubble{
    background:#fff;
    border-radius:20px 20px 20px 6px;
    padding:14px 20px 12px;
    margin:0 auto 0;
    position:relative;
    animation:pop .7s cubic-bezier(.34,1.56,.64,1) .7s both;
    display:inline-block;
  }
  @keyframes pop{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
  /* Punta de la burbuja apunta ABAJO (hacia el capibara) */
  .bubble::after{
    content:'';
    position:absolute;
    bottom:-13px;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-top:14px solid #fff;
  }
  .btitle{
    font-family:'Fraunces',serif;
    font-size:17px;font-weight:700;
    color:var(--navy);line-height:1.38;
    margin-bottom:4px;
  }
  .bsub{font-size:11px;color:#6B89B8}

  /* CAPIBARA */
  .capy-wrap{
    width:220px;height:auto;
    margin:8px auto 0;
    position:relative;
    animation:bob 2.6s ease-in-out infinite;
    filter:drop-shadow(0 14px 28px rgba(0,0,0,.35));
  }
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .capy-wrap img{width:100%;height:auto;display:block}

  /* BOTÓN */
  .btn{
    display:inline-flex;align-items:center;gap:12px;
    background:linear-gradient(135deg,var(--blu),var(--blum));
    color:var(--navy);
    font-family:'Fraunces',serif;font-size:19px;font-weight:700;
    padding:15px 42px;border-radius:50px;border:none;cursor:pointer;
    text-decoration:none;
    box-shadow:0 10px 28px rgba(90,174,224,.45);
    transition:transform .2s,box-shadow .2s;
    animation:up .9s cubic-bezier(.16,1,.3,1) 1.1s both;
    margin-top:4px;
  }
  .btn:hover{transform:translateY(-4px) scale(1.04);box-shadow:0 18px 38px rgba(90,174,224,.65)}
  .btn:active{transform:scale(.97)}
  .bicon{font-size:21px;transition:transform .25s}
  .btn:hover .bicon{transform:scale(1.2) rotate(-8deg)}

  .foot{
    margin-top:16px;font-size:11px;
    color:rgba(168,212,245,.35);letter-spacing:.06em;
    animation:up .9s cubic-bezier(.16,1,.3,1) 1.4s both;
  }

  @media(max-width:460px){
    .card{padding:24px 22px 30px}
    .capy-wrap{width:180px}
    .btitle{font-size:15px}
    .btn{font-size:16px;padding:13px 30px}
  }
</style>
</head>
